name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: "17"

defaults:
  run:
    shell: bash

jobs:
  test-and-lint:
    name: Test & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 36
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests + ktlint + detekt + Android lint
        run: ./gradlew check

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: shared/build/reports/tests/desktopTest/
          retention-days: 7

  android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 36
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-debug.apk
          path: androidApp/build/outputs/apk/debug/androidApp-debug.apk
          retention-days: 14

  desktop:
    name: Desktop (Windows)
    # 仅 Windows 运行：desktopApp 的 targetFormats 只声明了 Exe/Msi（见 desktopApp/build.gradle.kts），
    # ubuntu 上 packageDistributionForCurrentOS 没有任何可产出的格式，该矩阵腿只能空跑/报错。
    # 若未来需要 Linux 安装包：targetFormats 增加 TargetFormat.Deb 并恢复 os 矩阵。
    runs-on: windows-latest
    needs: test-and-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Build desktop distribution
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: tvlink-desktop-${{ runner.os }}
          path: desktopApp/build/compose/binaries/main/
          retention-days: 14
