name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: "17"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  test-and-lint:
    name: Test & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew :shared:desktopTest

      - name: ktlint + detekt
        run: ./gradlew check

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: shared/build/reports/tests/desktopTest/
          retention-days: 7

  android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-debug.apk
          path: androidApp/build/outputs/apk/debug/androidApp-debug.apk
          retention-days: 14

  desktop:
    name: Desktop Package
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs: test-and-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Build desktop distribution
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS

      - name: Upload package (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: tvlink-desktop-linux
          path: desktopApp/build/compose/binaries/main/
          retention-days: 14

      - name: Upload package (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tvlink-desktop-windows
          path: desktopApp/build/compose/binaries/main/
          retention-days: 14
